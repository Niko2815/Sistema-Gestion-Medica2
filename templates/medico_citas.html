{% extends "base.html" %}
{% block title %}Citas Médico{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-12 mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="fw-bold">Mis Citas</h1>
            <p class="text-muted">Administra tus citas programadas desde aquí.</p>
        </div>
        <a href="{{ url_for('medico.disponibilidad') }}" class="btn btn-primary btn-sm">Ver disponibilidad</a>
    </div>

    <div class="col-lg-10">
        <div class="card p-4 bg-dark text-light">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Paciente</th>
                            <th>Fecha</th>
                            <th>Horario</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCitasMedico">
                        <tr><td colspan="6" class="text-center py-4">Cargando citas...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-3 text-end">
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Volver al panel</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function cargarCitasMedico() {
    try {
        const res = await fetch('/appointment/api/appointments');
        const citas = await res.json();
        const tbody = document.getElementById('tablaCitasMedico');
        if (!citas.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-light">No hay citas asignadas</td></tr>';
            return;
        }
        tbody.innerHTML = citas.map(c => `
            <tr class="align-middle text-light">
                <td>#${c.id}</td>
                <td>${c.paciente_nombre || 'No asignado'}</td>
                <td>${c.fecha}</td>
                <td>${c.hora}</td>
                <td>${c.estado}</td>
                <td>
                    <button class="btn btn-outline-danger btn-sm" onclick="cancelarCita(${c.id})">Cancelar</button>
                </td>
            </tr>
        `).join('');
    } catch (e) {
        console.error('Error al cargar citas', e);
    }
}

async function cancelarCita(id) {
    if (!confirm('¿Confirmas cancelar esta cita?')) return;
    try {
        const res = await fetch(`/appointment/api/appointments/${id}`, { method: 'DELETE' });
        if (res.ok) {
            cargarCitasMedico();
        } else {
            const data = await res.json();
            alert(data.error || 'No se pudo cancelar la cita');
        }
    } catch (e) {
        console.error('Error al cancelar cita', e);
        alert('Error al cancelar cita');
    }
}

document.addEventListener('DOMContentLoaded', cargarCitasMedico);
</script>
{% endblock %}
