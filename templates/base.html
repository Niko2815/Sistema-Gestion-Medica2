<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Médico{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="/">Gestión Médica</a>
            {% if current_user.is_authenticated %}
            <div class="d-flex align-items-center gap-3">
                <a class="nav-link text-light" href="{{ url_for('dashboard') }}">Inicio</a>
                <a class="nav-link text-light" href="{{ url_for('notificaciones') }}">
                    Notificaciones{% if notifications_count %} <span class="badge bg-primary">{{ notifications_count }}</span>{% endif %}
                </a>
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('auth.logout') }}">Salir</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>lucide.createIcons();</script>
    {% block scripts %}{% endblock %}
</body>
</html>
