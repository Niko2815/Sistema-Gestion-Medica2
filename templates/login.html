{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="login-card">
            <div class="text-center mb-4">
                <i data-lucide="shield-check" class="text-primary mb-2" style="width: 48px; height: 48px;"></i>
                <h2 class="fw-bold">Iniciar Sesión</h2>
                <p class="text-muted">Ingresa tus credenciales para continuar</p>
            </div>
            
            <!-- Contenedor de error -->
            <div id="error-msg" class="error-box d-none"></div>

            <form onsubmit="manejarLogin(event)">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" required placeholder="admin@test.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3 d-flex justify-content-center align-items-center">
                    Entrar al Sistema <i data-lucide="arrow-right" class="ms-2" style="width: 18px;"></i>
                </button>
            </form>
            <div class="text-center mt-4">
                <small class="text-muted">¿No tienes cuenta? <a href="{{ url_for('register') }}" class="text-info text-decoration-none">Regístrate</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function manejarLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            const destino = data.role === 'admin'
                ? '/admin/dashboard'
                : data.role === 'medico'
                    ? '/medico/inicio'
                    : '/paciente/inicio';
            window.location.href = destino;
        } else {
            mostrarError(data.error || 'Credenciales incorrectas');
        }
    } catch (error) {
        mostrarError("Error de conexión con el servidor");
    }
}
</script>
{% endblock %}
