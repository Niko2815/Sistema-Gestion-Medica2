{% extends "base.html" %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="login-card">
            <div class="text-center mb-4">
                <i data-lucide="user-plus" class="text-primary mb-2" style="width: 48px; height: 48px;"></i>
                <h2 class="fw-bold">Registro de paciente</h2>
                <p class="text-muted">Crea tu cuenta y accede al panel de paciente.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="correo" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Documento</label>
                    <input type="text" name="documento" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Registrar cuenta</button>
            </form>
            <div class="text-center mt-4">
                <small class="text-muted">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" class="text-info text-decoration-none">Inicia sesión</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
