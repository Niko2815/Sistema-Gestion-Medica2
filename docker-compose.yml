version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hospital_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_medica
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mongo:
    image: mongo:6.0
    container_name: hospital_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      timeout: 20s
      retries: 10

  web:
    build: .
    container_name: hospital_web
    command: python app.py
    ports:
      - '5000:5000'
    environment:
      - SQLALCHEMY_DATABASE_URI=mysql+pymysql://root:root@db:3306/gestion_medica
      - MONGO_URI=mongodb://mongo:27017/gestion_medica_nosql
      - SECRET_KEY=clave_secreta_ing_bogota_2026
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - .:/app  # Monta el código local para desarrollo (opcional)
    stdin_open: true
    tty: true

volumes:
  db_data:
  mongo_data:
